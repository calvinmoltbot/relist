<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #e4e4e7;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      background: #27272a;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active { background: #10b981; }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(16px); }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 10px;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 600;
    }
    .stat-value.green { color: #10b981; }

    /* Send to ReList button */
    .send-btn {
      display: none;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #18181b;
      border: 1px solid #27272a;
      color: #e4e4e7;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-bottom: 12px;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .send-btn.visible { display: flex; }
    .send-btn:hover { background: #27272a; }
    .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .send-btn.success { background: #065f46; color: #10b981; border-color: #10b981; }
    .send-btn.error { background: #450a0a; color: #ef4444; border-color: #ef4444; }

    .link {
      display: block;
      text-align: center;
      padding: 8px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #a1a1aa;
      text-decoration: none;
      font-size: 12px;
      transition: background 0.2s, color 0.2s;
    }
    .link:hover { background: #27272a; color: #e4e4e7; }

    .status {
      text-align: center;
      font-size: 11px;
      color: #52525b;
      margin-top: 12px;
    }
    .status.active { color: #10b981; }

    /* Recent sent items */
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin: 14px 0 8px;
    }
    .recent-list {
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    .recent-list.visible { display: flex; }
    .recent-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      font-size: 11px;
      text-decoration: none;
      color: #a1a1aa;
      transition: background 0.15s;
    }
    .recent-item:hover { background: #27272a; color: #e4e4e7; }
    .recent-item-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 180px;
    }
    .recent-item-time {
      font-size: 10px;
      color: #52525b;
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* Settings */
    .settings-section {
      margin-top: 14px;
      border-top: 1px solid #27272a;
      padding-top: 12px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .settings-input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #27272a;
      border-radius: 6px;
      background: #18181b;
      color: #e4e4e7;
      font-size: 11px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .settings-input:focus { border-color: #3f3f46; }
    .settings-save {
      padding: 6px 10px;
      border: 1px solid #27272a;
      border-radius: 6px;
      background: #18181b;
      color: #a1a1aa;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .settings-save:hover { background: #27272a; color: #e4e4e7; }
    .settings-save.saved { color: #10b981; border-color: #10b981; }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">ReList</span>
    <div class="toggle active" id="toggle"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Today</div>
      <div class="stat-value green" id="today-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Status</div>
      <div class="stat-value" id="status-text" style="font-size: 13px;">Active</div>
    </div>
  </div>

  <!-- Send to ReList (visible only on item pages) -->
  <button class="send-btn" id="send-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
    Send to ReList
  </button>

  <a class="link" id="dashboard-link" href="#" target="_blank">Open ReList Dashboard</a>

  <!-- Recent sent items -->
  <div class="section-title" id="recent-title" style="display: none;">Recently Sent</div>
  <div class="recent-list" id="recent-list"></div>

  <div class="status active" id="status-line">Collecting data from Vinted</div>

  <!-- Settings -->
  <div class="settings-section">
    <div class="section-title" style="margin-top: 0;">API URL</div>
    <div class="settings-row">
      <input type="text" class="settings-input" id="api-url" placeholder="https://relist.warmwetcircles.com">
      <button class="settings-save" id="save-url">Save</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
