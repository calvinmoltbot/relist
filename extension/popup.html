<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #e4e4e7;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      background: #27272a;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active { background: #10b981; }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(16px); }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 10px;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 600;
    }
    .stat-value.green { color: #10b981; }
    .link {
      display: block;
      text-align: center;
      padding: 8px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #a1a1aa;
      text-decoration: none;
      font-size: 12px;
      transition: background 0.2s, color 0.2s;
    }
    .link:hover { background: #27272a; color: #e4e4e7; }
    .status {
      text-align: center;
      font-size: 11px;
      color: #52525b;
      margin-top: 12px;
    }
    .status.active { color: #10b981; }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">ReList</span>
    <div class="toggle active" id="toggle"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Today</div>
      <div class="stat-value green" id="today-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Status</div>
      <div class="stat-value" id="status-text" style="font-size: 13px;">Active</div>
    </div>
  </div>

  <a class="link" id="dashboard-link" href="#" target="_blank">Open ReList Dashboard</a>

  <div class="status active" id="status-line">Collecting data from Vinted</div>

  <script src="popup.js"></script>
</body>
</html>
